{% extends "base.html" %}

{% block title %}Sign In | PostPilot{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue your writing journey</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="credential">Email or Username</label>
                <input type="text" id="credential" name="credential" 
                       required autofocus class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                       required class="form-input">
                <div class="form-help">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        
        <div class="auth-divider">
            <span>or</span>
        </div>
        
        <div class="auth-footer">
            <p>New to PostPilot? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
